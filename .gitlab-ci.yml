workflow:
  name: My Pipeline
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH


stages:
  - test
  - build
  - security
  - deploy

test_lint:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r requirements-dev.txt
  script:
    - black --check ./src
    - isort --check-only ./src

test_unit:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r requirements.txt
  script:
    - python src/manage.py test src
  needs:
    - job: test_lint


test_integration:
  stage: test
  before_script:
    - echo $CI_JOB_NAME
  script:
    - echo $CI_JOB_NAME
  after_script:
    - echo $CI_JOB_NAME

build_app:
  stage: build
  before_script:
    - echo $CI_JOB_NAME
  script:
    - echo $CI_JOB_NAME
  after_script:
    - echo $CI_JOB_NAME

build_release_notes:
  stage: build
  needs:
  - job: test_integration
    optional: true
  before_script:
    - echo $CI_JOB_NAME
  script:
    - echo $CI_JOB_NAME
  after_script:
    - echo $CI_JOB_NAME

security_measurements:
  stage: security
  before_script:
    - echo $CI_JOB_NAME
  script:
    - echo $CI_JOB_NAME
  after_script:
    - echo $CI_JOB_NAME


deploy_staging:
  stage: deploy
  before_script:
    - echo $CI_JOB_NAME
  script:
    - echo $CI_JOB_NAME
  after_script:
    - echo $CI_JOB_NAME